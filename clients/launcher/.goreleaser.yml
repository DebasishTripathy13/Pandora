version: 2

project_name: pandora

before:
  hooks:
    - go mod tidy

builds:
  - id: pandora
    dir: .
    main: ./main.go
    binary: pandora
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/debasishtripathy13/Pandora/clients/launcher/cmd.version={{.Version}}

archives:
  - id: binaries
    format: binary
    name_template: "pandora-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: debasishtripathy13
    name: Pandora
  # Publish as draft so the GitHub `releases/latest` endpoint (used by the
  # launcher's update notice and explicit `pandora update`) does NOT see
  # this version until every Docker image is verified on GHCR. The publish-release job in
  # .github/workflows/release.yml flips draft → published once all images
  # exist, closing the release-atomicity gap that previously let the
  # launcher pull a tag whose images were still mid-push.
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
